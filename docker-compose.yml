# Observatory QA — Docker Compose
# Usage:
#   Development:  docker compose up
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required: Create a .env file from .env.example before running.

services:
  app:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://observatory:observatory@postgres:5432/observatory
      - REDIS_URL=redis://redis:6379
      - STORAGE_BACKEND=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  workers:
    build: .
    command: ["node", "dist/workers.js"]
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://observatory:observatory@postgres:5432/observatory
      - REDIS_URL=redis://redis:6379
      - STORAGE_BACKEND=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: observatory
      POSTGRES_PASSWORD: observatory
      POSTGRES_DB: observatory
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observatory"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

volumes:
  pgdata:
  redisdata:
