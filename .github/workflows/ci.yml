name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target after passing gates"
        required: false
        default: "none"
        type: choice
        options: [none, staging, production]
      ref:
        description: "Branch or SHA to deploy (defaults to triggering ref)"
        required: false
        default: ""

# Cancel in-progress runs for the same branch/PR (not for manual production deploys)
concurrency:
  group: ci-${{ github.ref }}-${{ github.event.inputs.deploy_target || 'auto' }}
  cancel-in-progress: ${{ github.event.inputs.deploy_target != 'production' }}

env:
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# Job: Lint + format check
# Blocks the build and all deploys. Zero-warning policy enforced.
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (warning budget)
        # Allow existing warnings (253 as of 2026-03-31) while preventing new ones.
        # All remaining warnings are @typescript-eslint/no-unused-vars.
        run: npm run lint -- --max-warnings 253

      - name: Format check
        run: npm run format:check

# ---------------------------------------------------------------------------
# Job: Type check + unit tests
# ---------------------------------------------------------------------------
  test:
    name: Type Check & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run check

      - name: Unit tests with coverage
        run: npx c8 --check-coverage --lines 70 --functions 60 --branches 55 --reporter=text --reporter=text-summary --reporter=lcov --src=server --src=shared tsx --test tests/*.test.ts

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.sha }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

# ---------------------------------------------------------------------------
# Job: Dependency security audit + secret scanning
# ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Scan for secrets in codebase
        run: |
          echo "Scanning for potential secrets in tracked files..."
          FINDINGS=0
          # AWS keys
          if git grep -lI 'AKIA[0-9A-Z]\{16\}' -- ':!*.md' ':!*.yml' ':!*.yaml' ':!.env.example' 2>/dev/null; then
            echo "::error::Possible AWS access key found in source files"
            FINDINGS=$((FINDINGS + 1))
          fi
          # Private keys
          if git grep -lI '-----BEGIN.*PRIVATE KEY-----' -- ':!*.md' ':!*.example' 2>/dev/null; then
            echo "::error::Possible private key found in source files"
            FINDINGS=$((FINDINGS + 1))
          fi
          # Generic API keys/tokens in .ts/.tsx files (common patterns)
          if git grep -lI 'sk-[a-zA-Z0-9]\{20,\}' -- '*.ts' '*.tsx' 2>/dev/null; then
            echo "::error::Possible API key found in TypeScript files"
            FINDINGS=$((FINDINGS + 1))
          fi
          if [ "$FINDINGS" -gt 0 ]; then
            echo "Found $FINDINGS potential secret(s) in source files"
            exit 1
          fi
          echo "No secrets detected"

# ---------------------------------------------------------------------------
# Job: Build — only runs after lint + test both pass (lint gate enforced)
# ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate schema sync coverage
        run: |
          echo "Checking that sync-schema.ts covers all Drizzle pgTable definitions..."
          # Extract table names from Drizzle schema (POSIX-compatible regex)
          DRIZZLE_TABLES=$(grep -o 'pgTable("[^"]*"' server/db/schema.ts | sed 's/pgTable("//;s/"//' | sort)
          MISSING=""
          for TABLE in $DRIZZLE_TABLES; do
            if ! grep -q "CREATE TABLE IF NOT EXISTS ${TABLE}" server/db/sync-schema.ts 2>/dev/null; then
              MISSING="$MISSING $TABLE"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::warning::Tables in schema.ts but missing from sync-schema.ts:$MISSING"
          else
            echo "All Drizzle tables covered in sync-schema.ts"
          fi

      - name: Build frontend + backend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          test -f dist/index.js   || (echo "ERROR: dist/index.js missing" && exit 1)
          test -d dist/public     || (echo "ERROR: dist/public/ missing"  && exit 1)
          echo "dist/index.js  -- $(du -h dist/index.js | cut -f1)"
          echo "dist/public/   -- $(du -sh dist/public  | cut -f1)"
          echo "Build artifacts verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job: Docker build + push to GHCR on main branch merges.
# PRs build without pushing (validation only).
# Requires: repo Settings → Actions → General → "Read and write permissions"
# ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ---------------------------------------------------------------------------
# Job: E2E tests — runs Playwright against the production build artifact
# ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          NODE_ENV: production
          PORT: "5000"
          DISABLE_SECURE_COOKIE: "true"
          SESSION_SECRET: e2e-test-secret-ci-only
          ASSEMBLYAI_API_KEY: test-key-ci
          AUTH_USERS: "admin:Admin1234!:admin:Test Admin:default,viewer:Viewer1234!:viewer:Test Viewer:default"
          PHI_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: test-results/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job: Quality Gate — explicit summary job that all deploy jobs depend on.
# Every quality check must be green before a single byte ships to any env.
# ---------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, security, build, e2e]
    steps:
      - name: All quality checks passed
        run: |
          echo "============================================"
          echo "  QUALITY GATE: ALL CHECKS PASSED"
          echo "============================================"
          echo "  - Lint (zero-warning policy)"
          echo "  - Format check (Prettier)"
          echo "  - TypeScript type check"
          echo "  - Unit tests"
          echo "  - Security audit (high/critical)"
          echo "  - Build (frontend + backend)"
          echo "  - E2E tests (Playwright / Chromium)"
          echo "============================================"
          echo "  SHA:   ${{ github.sha }}"
          echo "  Ref:   ${{ github.ref }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Time:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "============================================"

# ---------------------------------------------------------------------------
# Job: Deploy to Staging — triggered on main push or manual workflow_dispatch
# Requires quality-gate to pass first.
# ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality-gate
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
    environment: staging
    steps:
      - name: Record deploy intent
        run: |
          echo "Deploying SHA ${{ github.sha }} to staging"
          echo "Triggered by: ${{ github.event_name }} / ${{ github.actor }}"

      - name: Trigger Render deploy hook
        if: ${{ vars.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          RESPONSE=$(curl -sf -w "\nHTTP_STATUS:%{http_code}" "$RENDER_DEPLOY_HOOK_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Render deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Render deploy triggered (HTTP $HTTP_STATUS)"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Wait for Render build
        run: |
          echo "Waiting 45s for Render to build and restart..."
          sleep 45

      - name: Health check staging
        if: ${{ vars.STAGING_URL != '' }}
        run: |
          MAX_RETRIES=8
          RETRY_INTERVAL=15
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $STATUS -- retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "ERROR: Staging health check failed after $MAX_RETRIES attempts"
          exit 1
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}

      - name: Staging deploy complete
        run: echo "Staging deploy complete -- SHA ${{ github.sha }}"

# ---------------------------------------------------------------------------
# Job: Deploy to Production (EC2/HIPAA) — manual only via workflow_dispatch.
# Requires GitHub Environment protection rule (manual approval + wait timer).
# NEVER triggers automatically on push.
# ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production (EC2)
    runs-on: ubuntu-latest
    needs: quality-gate
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production'
    environment: production  # Configure approval reviewers in repo Settings -> Environments
    steps:
      - name: Pre-deploy summary
        run: |
          echo "============================================"
          echo "  PRODUCTION DEPLOY"
          echo "============================================"
          echo "  SHA:   ${{ github.sha }}"
          echo "  Ref:   ${{ github.ref }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Time:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "  Quality Gate:     PASSED"
          echo "  Manual approval:  GRANTED"
          echo "============================================"

      - name: Deploy to EC2 via SSH
        if: ${{ vars.EC2_HOST != '' }}
        run: |
          if [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2_SSH_KEY secret not set — skipping deploy"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Pass the exact git SHA so deploy.sh can pin to a reproducible commit
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "ec2-user@$EC2_HOST" \
            "sudo /opt/callanalyzer/deploy/ec2/deploy.sh main ${{ github.sha }}"
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Health check production
        if: ${{ vars.PRODUCTION_URL != '' }}
        run: |
          echo "Waiting 20s for service restart..."
          sleep 20
          MAX_RETRIES=6
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $STATUS -- retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Production health check failed -- initiate rollback"
          echo "  ssh ec2-user@${{ vars.EC2_HOST }} 'sudo /opt/callanalyzer/deploy/ec2/rollback.sh'"
          exit 1
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}

      - name: Production deploy complete
        run: |
          echo "Production deploy complete"
          echo "  SHA:  ${{ github.sha }}"
          echo "  Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
