name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target after passing gates"
        required: false
        default: "none"
        type: choice
        options: [none, staging, production]
      ref:
        description: "Branch or SHA to deploy (defaults to triggering ref)"
        required: false
        default: ""

# Cancel in-progress runs for the same branch/PR (not for manual production deploys)
concurrency:
  group: ci-${{ github.ref }}-${{ github.event.inputs.deploy_target || 'auto' }}
  cancel-in-progress: ${{ github.event.inputs.deploy_target != 'production' }}

env:
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# Job: Lint + format check
# Blocks the build and all deploys. Zero-warning policy enforced.
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (warning budget)
        # Allow existing warnings (275 as of 2026-04-02) while preventing new ones.
        # All remaining warnings are @typescript-eslint/no-unused-vars.
        run: npm run lint -- --max-warnings 275

      - name: Format check
        run: npm run format:check

# ---------------------------------------------------------------------------
# Job: Type check + unit tests
# ---------------------------------------------------------------------------
  test:
    name: Type Check & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run check

      - name: Unit tests with coverage
        # Thresholds set just below current main coverage levels under Node 20.
        # Most recent baseline (2026-04-28): lines 60.08%, functions 58.36%,
        # branches 82.69%. The lines threshold dropped from 60 to 59 in PR #76:
        # importing production helpers from tests (instead of redefining them)
        # pulls more transitive code into the c8 denominator without proportional
        # numerator gain — net more honest, slightly lower percentage. The
        # functions threshold went UP (50 → 55) because the same PR exercises
        # several real helpers that were previously simulated. These numbers act
        # as a regression ratchet — push them up incrementally as new tests land.
        run: npx c8 --check-coverage --lines 59 --functions 55 --branches 80 --reporter=text --reporter=text-summary --reporter=lcov --src=server --src=shared tsx --test tests/*.test.ts

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: unit-test-results-${{ github.sha }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

# ---------------------------------------------------------------------------
# Job: Dependency security audit + secret scanning
# ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Scan for secrets in codebase
        run: |
          echo "Scanning for potential secrets in tracked files..."
          FINDINGS=0
          # AWS keys
          if git grep -lI 'AKIA[0-9A-Z]\{16\}' -- ':!*.md' ':!*.yml' ':!*.yaml' ':!.env.example' 2>/dev/null; then
            echo "::error::Possible AWS access key found in source files"
            FINDINGS=$((FINDINGS + 1))
          fi
          # Private keys
          if git grep -lI '-----BEGIN.*PRIVATE KEY-----' -- ':!*.md' ':!*.example' 2>/dev/null; then
            echo "::error::Possible private key found in source files"
            FINDINGS=$((FINDINGS + 1))
          fi
          # Generic API keys/tokens in .ts/.tsx files (common patterns)
          if git grep -lI 'sk-[a-zA-Z0-9]\{20,\}' -- '*.ts' '*.tsx' 2>/dev/null; then
            echo "::error::Possible API key found in TypeScript files"
            FINDINGS=$((FINDINGS + 1))
          fi
          if [ "$FINDINGS" -gt 0 ]; then
            echo "Found $FINDINGS potential secret(s) in source files"
            exit 1
          fi
          echo "No secrets detected"

# ---------------------------------------------------------------------------
# Job: Build — only runs after lint + test both pass (lint gate enforced)
# ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate schema sync coverage (table + column level)
        run: npx tsx --test tests/schema-column-coverage.test.ts

      - name: Build frontend + backend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          test -f dist/index.js   || (echo "ERROR: dist/index.js missing" && exit 1)
          test -d dist/public     || (echo "ERROR: dist/public/ missing"  && exit 1)
          echo "dist/index.js  -- $(du -h dist/index.js | cut -f1)"
          echo "dist/public/   -- $(du -sh dist/public  | cut -f1)"
          echo "Build artifacts verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job: Docker build + push to GHCR on main branch merges.
# PRs build without pushing (validation only).
# Requires: repo Settings → Actions → General → "Read and write permissions"
# ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          # Always pull the latest base image so we don't reuse a stale
          # cached `node:20-slim` digest with fixable OS-package CVEs that
          # Trivy would then block on. The `apt-get upgrade` in the
          # Dockerfile production stage handles the rest.
          pull: true
          # Always build for local scanning; only push to GHCR on main pushes.
          # `load: true` makes the image available to the local Docker daemon
          # so the Trivy step below can scan it by tag without a registry round-trip.
          load: true
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pick the first tag from the metadata step for Trivy to scan. On PRs
      # this is the SHA tag; on main pushes it's the SHA tag too (latest is
      # appended after, so the array starts with SHA).
      - name: Resolve scan target tag
        id: scan_tag
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Scanning $TAG"

      # Trivy supply-chain / OS-package vulnerability scan. Fails the job on
      # any CRITICAL or HIGH severity finding (mirrors the npm audit gate in
      # the PR review workflow). Moderate/low issues are reported but don't
      # block — those flow through the weekly dependency-check report instead.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.24.0
        with:
          image-ref: ${{ steps.scan_tag.outputs.tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      # Emit SARIF for the GitHub Security tab even when the gate blocks.
      # `if: always()` ensures uploads happen on failure (the table run above
      # exits non-zero); without it we'd lose the report.
      - name: Generate Trivy SARIF for Security tab
        if: always()
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.24.0
        with:
          image-ref: ${{ steps.scan_tag.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          vuln-type: os,library

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@b56ba49b26e50535fa1e7f7db0f4f7b4bf65d80d # v3.28.10
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

# ---------------------------------------------------------------------------
# Job: E2E tests — runs Playwright against the production build artifact
# ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # Real PostgreSQL (with pgvector) + Redis as job services. Previously E2E ran
    # against MemStorage, which masked RLS, transaction, and constraint behavior.
    # The matching local command is `npm run test:e2e:pg` (see package.json).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: observatory
          POSTGRES_PASSWORD: observatory
          POSTGRES_DB: observatory_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U observatory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Install pgvector extension
        run: |
          PGPASSWORD=observatory psql -h localhost -U observatory -d observatory_e2e \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Diagnostic: boot the prod build for 25s with the same env Playwright
      # will use, capture stdout+stderr, and tail it. If startup fails, we see
      # the actual error instead of a silent "Exit code: 1" from Playwright's
      # webServer wrapper. `|| true` keeps the step non-fatal — a failing
      # startup here is what we WANT to surface, not a job-killer; the real
      # gate is the E2E step below.
      - name: Pre-flight production startup (diagnostic)
        run: |
          set +e
          (timeout 25 npm run start > /tmp/preflight.log 2>&1) &
          BOOT_PID=$!
          wait $BOOT_PID
          EXIT=$?
          echo "===== preflight exit code: $EXIT ====="
          echo "===== preflight log (last 200 lines) ====="
          tail -200 /tmp/preflight.log || true
          echo "===== end preflight log ====="
          # Don't fail the job here — let the E2E step be the gate.
          exit 0
        env:
          NODE_ENV: production
          PORT: "5000"
          DISABLE_SECURE_COOKIE: "true"
          SESSION_SECRET: e2e-test-secret-ci-only-32plus-chars-required
          ASSEMBLYAI_API_KEY: test-key-ci
          AUTH_USERS: "admin:admin123:admin:Test Admin:default,viewer:viewer123:viewer:Test Viewer:default"
          PHI_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          DATABASE_URL: postgresql://observatory:observatory@localhost:5432/observatory_e2e
          STORAGE_BACKEND: postgres
          REDIS_URL: redis://localhost:6379

      - name: Run E2E tests (PostgreSQL-backed)
        run: npm run test:e2e
        env:
          CI: "true"
          NODE_ENV: production
          PORT: "5000"
          DISABLE_SECURE_COOKIE: "true"
          SESSION_SECRET: e2e-test-secret-ci-only-32plus-chars-required
          ASSEMBLYAI_API_KEY: test-key-ci
          AUTH_USERS: "admin:admin123:admin:Test Admin:default,viewer:viewer123:viewer:Test Viewer:default"
          PHI_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          # Forwarded into the playwright webServer block — switches the app
          # from MemStorage to real PostgreSQL + Redis-backed sessions /
          # rate-limit. syncSchema(db) runs on startup to bootstrap tables.
          DATABASE_URL: postgresql://observatory:observatory@localhost:5432/observatory_e2e
          STORAGE_BACKEND: postgres
          REDIS_URL: redis://localhost:6379

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report-${{ github.sha }}
          path: test-results/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job: Quality Gate — explicit summary job that all deploy jobs depend on.
# Every quality check must be green before a single byte ships to any env.
# ---------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, security, build, docker, e2e]
    steps:
      - name: All quality checks passed
        run: |
          echo "============================================"
          echo "  QUALITY GATE: ALL CHECKS PASSED"
          echo "============================================"
          echo "  - Lint (zero-warning policy)"
          echo "  - Format check (Prettier)"
          echo "  - TypeScript type check"
          echo "  - Unit tests"
          echo "  - Security audit (high/critical)"
          echo "  - Build (frontend + backend)"
          echo "  - Docker build + Trivy image scan (critical/high)"
          echo "  - E2E tests (Playwright / Chromium)"
          echo "============================================"
          echo "  SHA:   ${{ github.sha }}"
          echo "  Ref:   ${{ github.ref }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Time:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "============================================"

# ---------------------------------------------------------------------------
# Job: Deploy to Staging — triggered on main push or manual workflow_dispatch
# Requires quality-gate to pass first.
# ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality-gate
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
    environment: staging
    steps:
      - name: Record deploy intent
        run: |
          echo "Deploying SHA ${{ github.sha }} to staging"
          echo "Triggered by: ${{ github.event_name }} / ${{ github.actor }}"

      - name: Trigger Render deploy hook
        if: ${{ vars.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          RESPONSE=$(curl -sf -w "\nHTTP_STATUS:%{http_code}" "$RENDER_DEPLOY_HOOK_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Render deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Render deploy triggered (HTTP $HTTP_STATUS)"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Wait for Render build
        run: |
          echo "Waiting 45s for Render to build and restart..."
          sleep 45

      - name: Health check staging
        if: ${{ vars.STAGING_URL != '' }}
        run: |
          MAX_RETRIES=8
          RETRY_INTERVAL=15
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $STATUS -- retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "ERROR: Staging health check failed after $MAX_RETRIES attempts"
          exit 1
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}

      - name: Staging deploy complete
        run: echo "Staging deploy complete -- SHA ${{ github.sha }}"

# ---------------------------------------------------------------------------
# Job: Deploy to Production (EC2/HIPAA) — manual only via workflow_dispatch.
# Requires GitHub Environment protection rule (manual approval + wait timer).
# NEVER triggers automatically on push.
# ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production (EC2)
    runs-on: ubuntu-latest
    needs: quality-gate
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production'
    environment: production  # Configure approval reviewers in repo Settings -> Environments
    steps:
      - name: Pre-deploy summary
        run: |
          echo "============================================"
          echo "  PRODUCTION DEPLOY"
          echo "============================================"
          echo "  SHA:   ${{ github.sha }}"
          echo "  Ref:   ${{ github.ref }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Time:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "  Quality Gate:     PASSED"
          echo "  Manual approval:  GRANTED"
          echo "============================================"

      - name: Deploy to EC2 via SSH
        if: ${{ vars.EC2_HOST != '' }}
        run: |
          if [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2_SSH_KEY secret not set — skipping deploy"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Pass the exact git SHA so deploy.sh can pin to a reproducible commit
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "ec2-user@$EC2_HOST" \
            "sudo /opt/callanalyzer/deploy/ec2/deploy.sh main ${{ github.sha }}"
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Health check production
        if: ${{ vars.PRODUCTION_URL != '' }}
        run: |
          echo "Waiting 20s for service restart..."
          sleep 20
          MAX_RETRIES=6
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $STATUS -- retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Production health check failed -- initiate rollback"
          echo "  ssh ec2-user@${{ vars.EC2_HOST }} 'sudo /opt/callanalyzer/deploy/ec2/rollback.sh'"
          exit 1
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}

      - name: Production deploy complete
        run: |
          echo "Production deploy complete"
          echo "  SHA:  ${{ github.sha }}"
          echo "  Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
