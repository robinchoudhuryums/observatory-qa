name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target after passing gates"
        required: false
        default: "none"
        type: choice
        options: [none, staging, production]
      ref:
        description: "Branch or SHA to deploy (defaults to triggering ref)"
        required: false
        default: ""

# Cancel in-progress runs for the same branch/PR (not for manual production deploys)
concurrency:
  group: ci-${{ github.ref }}-${{ github.event.inputs.deploy_target || 'auto' }}
  cancel-in-progress: ${{ github.event.inputs.deploy_target != 'production' }}

env:
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# Job: Lint + format check
# Blocks the build and all deploys. Zero-warning policy enforced.
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        # --max-warnings 0 ensures any ESLint warning fails the pipeline
        run: npm run lint -- --max-warnings 0

      - name: Format check
        run: npm run format:check

# ---------------------------------------------------------------------------
# Job: Type check + unit tests
# ---------------------------------------------------------------------------
  test:
    name: Type Check & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.sha }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

# ---------------------------------------------------------------------------
# Job: Dependency security audit
# ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high

# ---------------------------------------------------------------------------
# Job: Build — only runs after lint + test both pass (lint gate enforced)
# ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + backend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          test -f dist/index.js   || (echo "ERROR: dist/index.js missing" && exit 1)
          test -d dist/client     || (echo "ERROR: dist/client/ missing"  && exit 1)
          echo "dist/index.js  -- $(du -h dist/index.js | cut -f1)"
          echo "dist/client/   -- $(du -sh dist/client  | cut -f1)"
          echo "Build artifacts verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1

# ---------------------------------------------------------------------------
# Job: Docker build — validates Dockerfile; pushes to GHCR on main branch
# ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ---------------------------------------------------------------------------
# Job: E2E tests — runs Playwright against the production build artifact
# ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          NODE_ENV: production
          PORT: "5000"
          DISABLE_SECURE_COOKIE: "true"
          SESSION_SECRET: e2e-test-secret-ci-only
          ASSEMBLYAI_API_KEY: test-key-ci
          AUTH_USERS: "admin:Admin1234!:admin:Test Admin:default,viewer:Viewer1234!:viewer:Test Viewer:default"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: test-results/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job: Quality Gate — explicit summary job that all deploy jobs depend on.
# Every quality check must be green before a single byte ships to any env.
# ---------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, security, build, e2e]
    steps:
      - name: All quality checks passed
        run: |
          echo "============================================"
          echo "  QUALITY GATE: ALL CHECKS PASSED"
          echo "============================================"
          echo "  - Lint (zero-warning policy)"
          echo "  - Format check (Prettier)"
          echo "  - TypeScript type check"
          echo "  - Unit tests"
          echo "  - Security audit (high/critical)"
          echo "  - Build (frontend + backend)"
          echo "  - E2E tests (Playwright / Chromium)"
          echo "============================================"
          echo "  SHA:   ${{ github.sha }}"
          echo "  Ref:   ${{ github.ref }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Time:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "============================================"

# ---------------------------------------------------------------------------
# Job: Deploy to Staging — triggered on main push or manual workflow_dispatch
# Requires quality-gate to pass first.
# ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality-gate
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
    environment: staging
    steps:
      - name: Record deploy intent
        run: |
          echo "Deploying SHA ${{ github.sha }} to staging"
          echo "Triggered by: ${{ github.event_name }} / ${{ github.actor }}"

      - name: Trigger Render deploy hook
        if: vars.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          RESPONSE=$(curl -sf -w "\nHTTP_STATUS:%{http_code}" "$RENDER_DEPLOY_HOOK_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Render deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Render deploy triggered (HTTP $HTTP_STATUS)"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Wait for Render build
        run: |
          echo "Waiting 45s for Render to build and restart..."
          sleep 45

      - name: Health check staging
        if: vars.STAGING_URL != ''
        run: |
          MAX_RETRIES=8
          RETRY_INTERVAL=15
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $STATUS -- retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "ERROR: Staging health check failed after $MAX_RETRIES attempts"
          exit 1
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}

      - name: Staging deploy complete
        run: echo "Staging deploy complete -- SHA ${{ github.sha }}"

# ---------------------------------------------------------------------------
# Job: Deploy to Production (EC2/HIPAA) — manual only via workflow_dispatch.
# Requires GitHub Environment protection rule (manual approval + wait timer).
# NEVER triggers automatically on push.
# ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production (EC2)
    runs-on: ubuntu-latest
    needs: quality-gate
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production'
    environment: production  # Configure approval reviewers in repo Settings -> Environments
    steps:
      - name: Pre-deploy summary
        run: |
          echo "============================================"
          echo "  PRODUCTION DEPLOY"
          echo "============================================"
          echo "  SHA:   ${{ github.sha }}"
          echo "  Ref:   ${{ github.ref }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Time:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "  Quality Gate:     PASSED"
          echo "  Manual approval:  GRANTED"
          echo "============================================"

      - name: Deploy to EC2 via SSH
        if: vars.EC2_HOST != '' && secrets.EC2_SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Pass the exact git SHA so deploy.sh can pin to a reproducible commit
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "ec2-user@$EC2_HOST" \
            "sudo /opt/callanalyzer/deploy/ec2/deploy.sh main ${{ github.sha }}"
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Health check production
        if: vars.PRODUCTION_URL != ''
        run: |
          echo "Waiting 20s for service restart..."
          sleep 20
          MAX_RETRIES=6
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $STATUS -- retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Production health check failed -- initiate rollback"
          echo "  ssh ec2-user@${{ vars.EC2_HOST }} 'sudo /opt/callanalyzer/deploy/ec2/rollback.sh'"
          exit 1
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}

      - name: Production deploy complete
        run: |
          echo "Production deploy complete"
          echo "  SHA:  ${{ github.sha }}"
          echo "  Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
