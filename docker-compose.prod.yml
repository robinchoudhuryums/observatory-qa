# Production override — blue-green deployment support
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Blue-green deployment:
#   1. docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d app-green
#   2. Verify: curl http://localhost:5001/api/health/ready
#   3. Switch Caddy/nginx upstream to port 5001
#   4. docker compose stop app
#   5. When confirmed: docker compose rm app
#
# Rollback:
#   1. Switch upstream back to port 5000
#   2. docker compose stop app-green

services:
  app:
    # Blue (active) instance
    container_name: observatory-blue
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  app-green:
    # Green (standby) instance for zero-downtime deploys
    build: .
    container_name: observatory-green
    ports:
      - "5001:5000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://observatory:observatory@postgres:5432/observatory
      - REDIS_URL=redis://redis:6379
      - STORAGE_BACKEND=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - deploy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.get('http://localhost:5000/api/health/ready', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  workers:
    container_name: observatory-workers
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
