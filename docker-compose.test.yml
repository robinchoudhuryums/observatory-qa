# Observatory QA — E2E test profile
#
# Brings up just PostgreSQL (with pgvector) and Redis on the host so that
# `npm run test:e2e:pg` can run the Playwright suite against a real backend
# without spinning up the full app container — Playwright's webServer runs
# the Node process directly on the host and connects to these.
#
# The matching CI flow lives in .github/workflows/ci.yml under the `e2e` job
# (uses GitHub Actions services: directives instead of compose).
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait
#   npm run test:e2e   # with DATABASE_URL/STORAGE_BACKEND/REDIS_URL set
#   docker compose -f docker-compose.test.yml down -v
#
# `npm run test:e2e:pg` does all three steps for you.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: observatory
      POSTGRES_PASSWORD: observatory
      POSTGRES_DB: observatory_e2e
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observatory && psql -U observatory -d observatory_e2e -c 'CREATE EXTENSION IF NOT EXISTS vector;'"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
